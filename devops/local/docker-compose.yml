version: '3.8'

volumes:
  postgres-db-data: {}

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /home/mirnavasconcelos/projetosPessoais/docker/volume/minio:/data
    command: server /data --console-address ":9001"

  postgres-db:
    image: sameersbn/postgresql:14
    restart: always
    container_name: postgres-db
    command: postgres -c 'max_connections=2000'
    environment:
      DB_NAME: file-upload-system
      DB_USER: postgres
      DB_PASS: password@123
      PG_PASSWORD: password@123
    ports:
      - 5432:5432
    volumes:
      - postgres-db-data:/var/lib/postgresql/db-pessoal